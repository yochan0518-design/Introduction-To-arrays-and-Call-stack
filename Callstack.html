<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Stack Functions</title>
</head>
<body>
    <h2>Javascript Call Stack Functions</h2>
    <p>Do a calculation and the display the result.</p>
    <p id="demo"></p>
    <script>
        function add(a, b){
            return a + b;
        }
        function average(a, b) {
            return add(a, b) / 2;
        }
        let result=average(10, 20);
        document.getElementById("demo").innerHTML= result;
    </script>
</body>
</html>
